<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J.A.R.V.I.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="hud">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <header id="topbar">
      <div class="brand">J.A.R.V.I.S.</div>
      <div class="subtitle">Just A Rather Very Intelligent System</div>
      <div id="clock">--:--:--</div>
    </header>

    <main id="stage">
      <canvas id="orb"></canvas>
      <div id="state-label">SYSTEM BEREIT</div>
    </main>

    <section id="transcript" aria-live="polite"></section>

    <footer id="controls">
      <button id="mic-btn" title="Sprechen (Leertaste)">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
        </svg>
      </button>
      <input id="text-input" type="text" placeholder="…oder hier tippen und Enter druecken" autocomplete="off" />
      <button id="mute-btn" title="Stimme stummschalten">SPRACHE: AN</button>
      <button id="reset-btn" title="Gespraech zuruecksetzen">RESET</button>
    </footer>

    <div id="hint">Leertaste gedrueckt halten zum Sprechen · Enter zum Senden</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
